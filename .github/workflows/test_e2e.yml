name: E2E harness

on:
  workflow_dispatch:
    inputs:
      focus:
        description: "Harness focus mode (intent, cve, both)"
        required: false
        default: "cve"
        type: choice
        options:
          - intent
          - cve
          - both
      skip_intent:
        description: "Skip intent legs (no LLM required)"
        required: false
        default: true
        type: boolean
      duration_seconds:
        description: "Wall-clock budget in seconds"
        required: false
        default: "3600"
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  e2e:
    name: Run E2E harness
    runs-on: macos-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install edamame_cli
        run: |
          brew install edamametechnologies/tap/edamame-cli || true

      - name: Run E2E harness
        env:
          EDAMAME_LLM_API_KEY: ${{ secrets.EDAMAME_LLM_API_KEY }}
        run: |
          chmod +x tests/e2e/run_e2e_harness.sh
          ARGS="--focus ${{ inputs.focus }} --duration-seconds ${{ inputs.duration_seconds }}"
          if [[ "${{ inputs.skip_intent }}" == "true" ]]; then
            ARGS="$ARGS --skip-intent"
          fi
          bash tests/e2e/run_e2e_harness.sh $ARGS --strict

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports-${{ github.run_id }}
          path: ~/.edamame_e2e_reports/
          retention-days: 30

      - name: Slack alert on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          channel-id: "C072J0U9TH7"
          slack-message: |
            *agent_security E2E Failed*
            Repository: ${{ github.repository }}
            Branch: ${{ github.ref }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        continue-on-error: true
